<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Hacker | Marketing Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .gradient-text {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-color: rgba(56, 189, 248, 0.3); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen p-8 relative overflow-hidden">
    <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-indigo-600/20 blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] rounded-full bg-sky-500/20 blur-[120px] pointer-events-none"></div>

    <div class="max-w-4xl mx-auto relative z-10">
        <header class="mb-12 flex justify-between items-center border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-4xl font-bold tracking-tight gradient-text">ATS Hacker</h1>
                <p class="text-slate-400 mt-2">Autonomous Marketing Dashboard</p>
            </div>
            <div class="text-right">
                <span id="lead-count" class="text-3xl font-bold text-white">0</span>
                <p class="text-slate-500 text-sm font-semibold uppercase tracking-wider">Pending Leads</p>
            </div>
        </header>

        <main id="drafts-container" class="space-y-6">
            <div class="text-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-sky-400 mx-auto"></div>
                <p class="mt-4 text-slate-400">Scanning for leads...</p>
            </div>
        </main>
    </div>

    <script>
        const container = document.getElementById('drafts-container');
        const leadCount = document.getElementById('lead-count');

        async function fetchDrafts() {
            const res = await fetch('/api/drafts');
            const drafts = await res.json();
            renderDrafts(Array.isArray(drafts) ? drafts : []);
        }

        function createEl(tag, className, text) {
            const node = document.createElement(tag);
            if (className) node.className = className;
            if (text !== undefined) node.textContent = text;
            return node;
        }

        function safeUrl(rawUrl) {
            try {
                const parsed = new URL(String(rawUrl));
                return ['http:', 'https:'].includes(parsed.protocol) ? parsed.href : '#';
            } catch {
                return '#';
            }
        }

        function setEmptyState() {
            const empty = createEl('div', 'text-center py-20 glass rounded-2xl');
            empty.appendChild(createEl('h3', 'text-xl font-semibold text-white', 'Inbox Zero'));
            empty.appendChild(createEl('p', 'text-slate-400 mt-2', 'No pending leads. Run the scraper to find more!'));
            container.replaceChildren(empty);
        }

        function updateCount(delta) {
            const current = Number.parseInt(leadCount.textContent || '0', 10) || 0;
            leadCount.textContent = String(Math.max(0, current + delta));
        }

        function renderDrafts(drafts) {
            leadCount.textContent = String(drafts.length);

            if (drafts.length === 0) {
                setEmptyState();
                return;
            }

            const fragment = document.createDocumentFragment();
            drafts.forEach((draft) => fragment.appendChild(createDraftCard(draft)));
            container.replaceChildren(fragment);
        }

        function createDraftCard(draft) {
            const postId = String(draft.post_id || '');
            const url = safeUrl(draft.url);
            const reply = String(draft.draft_reply || '');

            const card = createEl('div', 'glass p-6 rounded-2xl card-hover');

            const top = createEl('div', 'flex justify-between items-start mb-4');
            top.appendChild(createEl('h2', 'text-xl font-semibold text-white pr-4 leading-snug', String(draft.title || 'Untitled lead')));

            const link = createEl('a', 'text-sky-400 hover:text-sky-300 text-sm flex-shrink-0');
            link.href = url;
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.textContent = 'View Source';
            top.appendChild(link);
            card.appendChild(top);

            card.appendChild(createEl(
                'div',
                'bg-slate-900/50 p-4 rounded-xl border border-slate-700/50 mb-6 font-mono text-sm text-slate-300 leading-relaxed shadow-inner whitespace-pre-wrap',
                reply
            ));

            const actions = createEl('div', 'flex gap-4');
            const approve = createEl(
                'button',
                'flex-1 bg-gradient-to-r from-sky-500 to-indigo-500 hover:from-sky-400 hover:to-indigo-400 text-white font-semibold py-3 px-6 rounded-xl shadow-lg shadow-sky-500/25 transition-all focus:ring-2 focus:ring-sky-400 focus:outline-none',
                'Copy Pitch & Open Reddit'
            );
            approve.addEventListener('click', () => approveDraft(postId, url, reply, card));

            const reject = createEl(
                'button',
                'px-6 py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-semibold rounded-xl border border-slate-700 transition-colors',
                'Reject'
            );
            reject.addEventListener('click', () => rejectDraft(postId, card));

            actions.appendChild(approve);
            actions.appendChild(reject);
            card.appendChild(actions);

            return card;
        }

        async function approveDraft(postId, url, reply, card) {
            try {
                await navigator.clipboard.writeText(reply);
            } catch (err) {
                console.error('Clipboard failed', err);
                alert('Failed to copy automatically. Please copy it manually.');
            }

            await fetch('/api/drafts/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ post_id: postId, status: 'posted' }),
            });

            card.remove();
            updateCount(-1);
            window.open(url, '_blank', 'noopener,noreferrer');

            if (leadCount.textContent === '0') fetchDrafts();
        }

        async function rejectDraft(postId, card) {
            await fetch('/api/drafts/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ post_id: postId, status: 'rejected' }),
            });

            card.remove();
            updateCount(-1);
            if (leadCount.textContent === '0') fetchDrafts();
        }

        fetchDrafts();
    </script>
</body>
</html>
